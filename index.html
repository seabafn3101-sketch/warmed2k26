<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Fire vs Team Ice — Marcador en vivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Rubik:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-dark:#12121c;
    --fire-1:#ff6b35;
    --fire-2:#c1121f;
    --fire-glow:#ffb703;
    --ice-1:#4cc9f0;
    --ice-2:#0b4f6c;
    --ice-glow:#caf0f8;
    --cream:#f4f1ea;
    --muted:#8a97a6;
    --line: rgba(255,255,255,0.08);
  }

  *{ box-sizing:border-box; }

html, body{
    width:100%;
    height:100%;
    margin:0;
    padding:0;
    background:transparent;
}

  body{
    font-family:'Rubik', sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

  .arena{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:20px;

    width:100%;
    height:100%;
}

  /* Indicador de conexión a Firebase */
  .status{
    position:absolute;
    top:-22px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:6px;
    font-size:9px;
    letter-spacing:1.5px;
    color:var(--muted);
    text-transform:uppercase;
    background:rgba(6,10,15,0.85);
    padding:3px 10px;
    border-radius:20px;
    border:1px solid var(--line);
    white-space:nowrap;
  }
  .dot{
    width:6px; height:6px; border-radius:50%;
    background:#ef4444;
    transition:background .3s ease;
  }
  .dot.live{ background:#2fe08a; box-shadow:0 0 6px #2fe08a; }

  .card{
    width:auto;
    border-radius:18px;
    padding:5px;
    text-align:left;
    position:relative;
    box-shadow:0 12px 26px rgba(0,0,0,0.5);
    transition:box-shadow .4s ease;
  }

  .card.fire{
    background: linear-gradient(160deg, #ff9e42 0%, #d62828 60%, #4a0e0e 100%);
    box-shadow:0 0 0 3px #ffb703, 0 12px 28px rgba(214,40,40,0.45);
  }
  .card.ice{
    background: linear-gradient(160deg, #8ecae6 0%, #219ebc 60%, #03045e 100%);
    box-shadow:0 0 0 3px #caf0f8, 0 12px 28px rgba(33,158,188,0.45);
  }

  /* Brillo extra para el equipo que va ganando */
  .card.fire.leading{
    box-shadow:0 0 0 3px #ffb703, 0 0 22px rgba(255,70,0,.85), 0 0 46px rgba(255,0,0,.55);
  }
  .card.ice.leading{
    box-shadow:0 0 0 3px #caf0f8, 0 0 22px rgba(90,180,255,.9), 0 0 46px rgba(0,120,255,.55);
  }

  .card-inner{
    background:rgba(10,8,14,0.65);
    border-radius:14px;
    padding:14px 24px 14px 12px;
    display:flex;
    align-items:center;
    gap:16px;
  }

  .sprite-wrap{
    width:82px;
    height:82px;
    flex-shrink:0;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow:hidden;
  }
  .fire .sprite-wrap{ background:radial-gradient(circle, rgba(255,183,3,0.4) 0%, transparent 70%); }
  .ice .sprite-wrap{ background:radial-gradient(circle, rgba(202,240,248,0.4) 0%, transparent 70%); }

  .sprite-wrap img{
    width:76px;
    height:76px;
    object-fit:cover;
    image-rendering:pixelated;
    filter:drop-shadow(0 4px 7px rgba(0,0,0,0.5));
    animation: float 3s ease-in-out infinite;
  }
  
  #sprite2 img{
    width:82px;
    height:82px;

  }
  
  @keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-5px); }
  }

  .info{ display:flex; flex-direction:column; align-items:center; line-height:1.2; }

  .team-name{
    font-family:'Press Start 2P', monospace;
    font-size:0.7rem;
    color:var(--cream);
    margin:0 0 8px;
    letter-spacing:0.5px;
    text-align:center;
  }
  .fire .team-name{ color:var(--fire-glow); }
  .ice .team-name{ color:var(--ice-glow); }

  .score-row{ display:flex; flex-direction:column; align-items:center; gap:2px; }

  .score{
    font-family:'Press Start 2P', monospace;
    font-size:1.9rem;
    color:#fff;
    line-height:2;
    text-shadow:0 0 12px currentColor;
    font-variant-numeric:tabular-nums;
    transition:transform .18s ease;
  }
  .fire .score{ color:var(--fire-glow); }
  .ice .score{ color:var(--ice-glow); }
  .score.bump{ transform:scale(1.25); }

  .puntos-label{
    font-size:0.65rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:rgba(244,241,234,0.6);
  }

  /* Panel de control manual (solo visible con ?admin=1 en la URL) */
  .admin{
    position:fixed;
    bottom:16px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    background:rgba(6,10,15,0.9);
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 14px;
    font-family:'Rubik', sans-serif;
    z-index:10;
    max-width:90vw;
  }
  .admin button{
    cursor:pointer;
    border:none;
    border-radius:8px;
    padding:8px 12px;
    font-weight:700;
    font-size:13px;
    letter-spacing:.5px;
    color:#fff;
  }
  .admin .b1{ background:var(--fire-2); }
  .admin .b2{ background:var(--ice-2); }
  .admin .reset{ background:#444; }
  .admin[hidden]{ display:none; }
</style>
</head>
<body>

<div class="arena">

  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Conectando…</span>
  </div>

  <div class="card fire" id="team1">
   <div class="card-inner">
    <div class="sprite-wrap" id="sprite1">
      <img src="./moltres.png" alt="Charizard">
    </div>
    <div class="info">
      <div class="team-name" id="name1">Team Fire</div>
      <div class="score-row">
        <span class="score" id="points1">0</span>
        <span class="puntos-label">Puntos</span>
      </div>
    </div>
   </div>
  </div>

  <div class="vs"></div>

  <div class="card ice" id="team2">
   <div class="card-inner">
    <div class="sprite-wrap" id="sprite2">
      <img src="./articuno.png" alt="Articuno">
    </div>
    <div class="info">
      <div class="team-name" id="name2">Team Ice</div>
      <div class="score-row">
        <span class="score" id="points2">0</span>
        <span class="puntos-label">Puntos</span>
      </div>
    </div>
   </div>
  </div>

</div>

<!-- Panel de control manual: solo aparece si abres la página con ?admin=1 al final de la URL -->
<div class="admin" id="adminPanel" hidden>
  <button class="b1" data-team="1" data-amount="1">+1 Fire</button>
  <button class="b1" data-team="1" data-amount="-1">-1 Fire</button>
  <button class="b2" data-team="2" data-amount="1">+1 Ice</button>
  <button class="b2" data-team="2" data-amount="-1">-1 Ice</button>
  <button class="reset" data-team="1" data-action="reset">Reset Fire</button>
  <button class="reset" data-team="2" data-action="reset">Reset Ice</button>
</div>

<!-- SDK de Firebase (compat, más simple para un solo archivo) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<script>
  // Configuración del proyecto de Firebase[cite: 1]
  const firebaseConfig = {
    apiKey: "AIzaSyB6wlktfq_WT1r7HnzfeUn0dnZtxnfyTfY",
    authDomain: "warmed-24ed1.firebaseapp.com",
    databaseURL: "https://warmed-24ed1-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "warmed-24ed1",
    storageBucket: "warmed-24ed1.firebasestorage.app",
    messagingSenderId: "749203234608",
    appId: "1:749203234608:web:a15816a21b4108ce88f2f5"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const ref = db.ref('scoreboard');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');

  // Listener para el estado de la conexión en vivo[cite: 1]
  db.ref('.info/connected').on('value', (snap) => {
    const connected = snap.val() === true;
    statusDot.classList.toggle('live', connected);
    statusText.textContent = connected ? 'En vivo' : 'Conectando…';
  });

  // Renderizador dinámico de los equipos desde la BD[cite: 1]
  function renderTeam(key, data){
    if(!data) return;
    const slot = key.slice(-1); // "1" o "2"
    const nameEl = document.getElementById('name' + slot);
    const pointsEl = document.getElementById('points' + slot);
    const spriteWrap = document.getElementById('sprite' + slot);

    if (key === "team1") {
      nameEl.textContent = "Team Fire";
    } else {
    nameEl.textContent = "Team Ice";
  }

    const newPoints = Number(data.points || 0);
    if(pointsEl.textContent !== String(newPoints)){
      pointsEl.textContent = newPoints;
      pointsEl.classList.remove('bump');
      void pointsEl.offsetWidth; // truco para reiniciar la animación CSS
      pointsEl.classList.add('bump');
    }

    if(data.sprite){
      spriteWrap.innerHTML = `<img src="${data.sprite}" alt="${data.name || ''}">`;
    }

    updateLeader();
  }

  // Compara puntajes y añade la clase 'leading' al que vaya ganando[cite: 1]
  function updateLeader(){
    const p1 = Number(document.getElementById('points1').textContent || 0);
    const p2 = Number(document.getElementById('points2').textContent || 0);
    document.getElementById('team1').classList.toggle('leading', p1 > p2);
    document.getElementById('team2').classList.toggle('leading', p2 > p1);
  }

  // Escucha activa de cambios en Firebase[cite: 1]
  ref.child('team1').on('value', (snap) => renderTeam('team1', snap.val()));
  ref.child('team2').on('value', (snap) => renderTeam('team2', snap.val()));

  // ---------------------------------------------------------------
  // Panel de control manual -> llama al Worker de Cloudflare[cite: 1]
  // ---------------------------------------------------------------
  const WORKER_URL = 'https://hidden-band-5fec.seabafn3101.workers.dev/punto';

  const params = new URLSearchParams(window.location.search);
  if (params.get('admin') === '1') {
    document.getElementById('adminPanel').hidden = false;

    document.querySelectorAll('.admin button').forEach((btn) => {
      btn.addEventListener('click', async () => {
        let token = sessionStorage.getItem('bridgeToken');
        if (!token) {
          token = prompt('Introduce tu BRIDGE_TOKEN del Worker:');
          if (!token) return;
          sessionStorage.setItem('bridgeToken', token);
        }

        const team = btn.dataset.team;
        const action = btn.dataset.action; 
        let url = `${WORKER_URL}?team=${team}&token=${encodeURIComponent(token)}`;
        if (action === 'reset') {
          url += '&action=reset';
        } else {
          url += `&amount=${btn.dataset.amount}`;
        }

        btn.disabled = true;
        try {
          const res = await fetch(url);
          if (!res.ok) {
            sessionStorage.removeItem('bridgeToken');
            alert('Error al actualizar: ' + (await res.text()));
          }
        } catch (err) {
          alert('No se pudo contactar con el Worker: ' + err.message);
        } finally {
          btn.disabled = false;
        }
      });
    });
  }
</script>

</body>
</html>
